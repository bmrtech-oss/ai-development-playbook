stages:
  - test
  - build
  - deploy-staging
  - e2e
  - deploy-prod

variables:
  FEATURE_FLAG_DEPLOY: "false"
  STAGING_ENV: "staging"

test:
  stage: test
  script:
    - python -m venv .venv
    - .venv/Scripts/activate  # Windows
    - pip install -U pip
    - pip install -r quickstart/slm-eval-template/requirements.txt
    - pytest --maxfail=1 --disable-warnings
  artifacts:
    when: always
    reports:
      junit: junit.xml

build:
  stage: build
  script:
    - echo "Building container images and packaging artifacts"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

deploy-staging:
  stage: deploy-staging
  script:
    - echo "Deploying to staging"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $FEATURE_FLAG_DEPLOY == "true"'

e2e:
  stage: e2e
  script:
    - echo "Running end-to-end tests"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $FEATURE_FLAG_DEPLOY == "true"'

deploy-prod:
  stage: deploy-prod
  script:
    - echo "Deploying to production"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $FEATURE_FLAG_DEPLOY == "true" && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
