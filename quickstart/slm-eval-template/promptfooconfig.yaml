provider:
  name: mock
  type: local
  model: "ollama:local-model"
  timeout: 10

tasks:
  - id: sample-code-explain
    prompt: |
      You are an AI assistant that explains code clearly and concisely.
      Input: {{ input }}
    input:
      - input: "def add(a, b): return a + b"
    expected:
      output: "Defines a function named add that returns the sum of a and b."
