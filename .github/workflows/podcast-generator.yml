name: Generate Podcast Episode

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Mondays at 9 AM UTC
  workflow_dispatch:

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests

      - name: Generate Podcast Episode
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          CLOUD_STORAGE_KEY: ${{ secrets.CLOUD_STORAGE_KEY }}
        run: python scripts/generate_podcast_episode.py

      - name: Update RSS Feed
        run: |
          # Update podcast.xml with new episode
          python scripts/update_rss_feed.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add podcast.xml
          git commit -m "Add new podcast episode" || echo "No changes to commit"
          git push