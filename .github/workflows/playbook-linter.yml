name: Playbook Linter

on:
  workflow_call:
    inputs:
      strict_mode:
        description: 'Enable strict mode for additional checks'
        required: false
        default: 'false'
        type: boolean
      report_format:
        description: 'Output format: json or markdown'
        required: false
        default: 'markdown'
        type: string
      fail_on_warning:
        description: 'Fail the workflow on warnings'
        required: false
        default: 'false'
        type: boolean

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.repository.full_name }}
          path: ./caller-repo

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Run Playbook Linter
        run: python scripts/playbook_linter.py --repo-path ./caller-repo --strict ${{ inputs.strict_mode }} --format ${{ inputs.report_format }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: playbook-lint-report
          path: lint-report.${{ inputs.report_format }}