name: 'Playbook Linter'
description: 'Validate playbook compliance in your repository'
inputs:
  strict_mode:
    description: 'Enable strict mode for additional checks'
    required: false
    default: 'false'
  report_format:
    description: 'Output format: json or markdown'
    required: false
    default: 'markdown'
  fail_on_warning:
    description: 'Fail the workflow on warnings'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Checkout playbook repository
      uses: actions/checkout@v4
      with:
        repository: 'bmrtech-oss/ai-development-playbook'
        path: ./playbook

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyYAML

    - name: Run Playbook Linter
      run: python ./playbook/scripts/playbook_linter.py --repo-path . --strict ${{ inputs.strict_mode }} --format ${{ inputs.report_format }}
      shell: bash

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: playbook-lint-report
        path: lint-report.${{ inputs.report_format }}